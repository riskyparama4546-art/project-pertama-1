<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Quiz Challenge</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:rgba(0,0,0,0.7);
padding:30px;
border-radius:15px;
width:90%;
max-width:500px;
text-align:center;
}

h1{
margin-bottom:20px;
}

.question{
font-size:18px;
margin-bottom:20px;
}

.answers button{
display:block;
width:100%;
margin:8px 0;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.answers button:hover{
transform:scale(1.05);
}

.correct{
background:#2ecc71 !important;
}

.wrong{
background:#e74c3c !important;
}

.leaderboard{
margin-top:20px;
text-align:left;
}

input{
padding:10px;
border-radius:8px;
border:none;
width:80%;
margin-bottom:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>Quiz Challenge</h1>

<div id="quiz">

<div class="question" id="question"></div>

<div class="answers" id="answers"></div>

</div>

<div id="result" style="display:none">

<h2>Quiz Selesai</h2>

<p id="score"></p>

<input type="text" id="name" placeholder="Masukkan nama">

<br><br>

<button onclick="saveScore()">Simpan Score</button>

<div class="leaderboard">

<h3>Leaderboard</h3>

<ol id="leaderboard"></ol>

</div>

</div>

</div>

<script>

const questions=[

// SEJARAH
{q:"Siapa presiden pertama Indonesia?",a:["Soekarno","Suharto","Habibie","Megawati"],c:0},
{q:"Perang Diponegoro terjadi tahun?",a:["1825","1900","1945","1800"],c:0},
{q:"Proklamasi Indonesia dibacakan di?",a:["Jakarta","Bandung","Surabaya","Yogyakarta"],c:0},
{q:"Siapa penemu benua Amerika?",a:["Columbus","Magellan","Newton","Tesla"],c:0},
{q:"Kerajaan Majapahit berdiri di?",a:["Jawa Timur","Bali","Sumatra","Kalimantan"],c:0},

// MTK DERET
{q:"2,4,6,8,... suku ke-5?",a:["10","12","14","16"],c:0},
{q:"3,6,9,12,... beda?",a:["3","2","4","5"],c:0},
{q:"5,10,15,... suku ke-6?",a:["30","35","40","45"],c:0},
{q:"1,4,7,... beda?",a:["3","4","5","2"],c:0},
{q:"10,20,30,... suku ke-4?",a:["40","50","60","70"],c:0},

// ASTRONOMI
{q:"Planet terbesar?",a:["Jupiter","Mars","Venus","Merkurius"],c:0},
{q:"Bintang pusat tata surya?",a:["Matahari","Polaris","Sirius","Vega"],c:0},
{q:"Planet merah?",a:["Mars","Venus","Saturnus","Jupiter"],c:0},
{q:"Galaksi tempat bumi berada?",a:["Bima Sakti","Andromeda","Orion","Pegasus"],c:0},
{q:"Satelit alami bumi?",a:["Bulan","Phobos","Europa","Titan"],c:0},

// BAHASA INDONESIA
{q:"Antonim 'besar'?",a:["Kecil","Tinggi","Panjang","Lebar"],c:0},
{q:"Sinonim 'cepat'?",a:["Lekas","Lambat","Pelan","Diam"],c:0},
{q:"Kalimat tanya diakhiri tanda?",a:["?","!",".",","],c:0},
{q:"'Aku membaca buku' termasuk?",a:["Kalimat aktif","Kalimat pasif","Majas","Frasa"],c:0},
{q:"Lawan kata 'panas'?",a:["Dingin","Hangat","Sejuk","Beku"],c:0},
{q:"Sinonim 'indah'?",a:["Cantik","Buruk","Kasar","Gelap"],c:0},
{q:"Huruf kapital dipakai untuk?",a:["Awal kalimat","Tengah kata","Akhir kalimat","Angka"],c:0},
{q:"Kata kerja disebut?",a:["Verba","Nomina","Adjektiva","Konjungsi"],c:0},
{q:"Kalimat perintah diakhiri?",a:["!","?",".",","],c:0},
{q:"Lawan kata 'tinggi'?",a:["Rendah","Pendek","Kecil","Tipis"],c:0},

// KANJI
{q:"Kanji 山 artinya?",a:["Gunung","Air","Api","Langit"],c:0},
{q:"Kanji 水 artinya?",a:["Air","Api","Tanah","Langit"],c:0},
{q:"Kanji 火 artinya?",a:["Api","Air","Angin","Langit"],c:0},
{q:"Kanji 木 artinya?",a:["Pohon","Gunung","Api","Air"],c:0},
{q:"Kanji 日 artinya?",a:["Matahari","Bulan","Air","Api"],c:0},
{q:"Kanji 月 artinya?",a:["Bulan","Hari","Api","Angin"],c:0},
{q:"Kanji 人 artinya?",a:["Orang","Gunung","Api","Air"],c:0},
{q:"Kanji 口 artinya?",a:["Mulut","Mata","Hidung","Telinga"],c:0},
{q:"Kanji 目 artinya?",a:["Mata","Mulut","Tangan","Kaki"],c:0}

];

let index=0;
let score=0;

const question=document.getElementById("question");
const answers=document.getElementById("answers");

function loadQuestion(){

let q=questions[index];

question.innerText=(index+1)+". "+q.q;

answers.innerHTML="";

q.a.forEach((text,i)=>{

let btn=document.createElement("button");
btn.innerText=text;

btn.onclick=()=>selectAnswer(btn,i);

answers.appendChild(btn);

});

}

function selectAnswer(btn,i){

let correct=questions[index].c;

if(i===correct){
btn.classList.add("correct");
score++;
}else{
btn.classList.add("wrong");
answers.children[correct].classList.add("correct");
}

setTimeout(()=>{

index++;

if(index<questions.length){
loadQuestion();
}else{
showResult();
}

},700);

}

function showResult(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("score").innerText=
"Score kamu: "+score+" / "+questions.length;

loadLeaderboard();

}

function saveScore(){

let name=document.getElementById("name").value;

if(!name)return;

let leaderboard=
JSON.parse(localStorage.getItem("quizLeaderboard"))||[];

leaderboard.push({name,score});

leaderboard.sort((a,b)=>b.score-a.score);

leaderboard=leaderboard.slice(0,10);

localStorage.setItem("quizLeaderboard",JSON.stringify(leaderboard));

loadLeaderboard();

}

function loadLeaderboard(){

let leaderboard=
JSON.parse(localStorage.getItem("quizLeaderboard"))||[];

let list=document.getElementById("leaderboard");

list.innerHTML="";

leaderboard.forEach(player=>{

let li=document.createElement("li");

li.innerText=player.name+" - "+player.score;

list.appendChild(li);

});

}

loadQuestion();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Quiz Challenge</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:rgba(0,0,0,0.7);
padding:30px;
border-radius:15px;
width:95%;
max-width:600px;
text-align:center;
}

h2{margin-bottom:10px}

.question{
font-size:20px;
margin-bottom:20px;
}

.answers button{
display:block;
width:100%;
margin:8px 0;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.answers button:hover{
transform:scale(1.03);
}

.correct{background:#2ecc71}
.wrong{background:#e74c3c}

input{
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
width:70%;
}

</style>
</head>
<body>

<div class="container">

<h2>Mega Quiz</h2>

<div id="quiz">
<div class="question" id="question"></div>
<div class="answers" id="answers"></div>
</div>

<div id="result" style="display:none">

<h2>Quiz Selesai</h2>

<p id="score"></p>

<input id="name" placeholder="Masukkan nama">

<br><br>

<button onclick="saveScore()">Simpan Score</button>

<h3>Leaderboard</h3>
<ol id="leaderboard"></ol>

</div>

</div>

<script>

/* RANDOM */

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

/* SOAL UMUM */

const generalQuestions=[

// SEJARAH
{q:"Siapa presiden pertama Indonesia?",a:["Soekarno","Suharto","Habibie","Megawati"],c:"Soekarno"},
{q:"Perang Diponegoro terjadi tahun?",a:["1825","1900","1945","1800"],c:"1825"},
{q:"Proklamasi Indonesia dibacakan di?",a:["Jakarta","Bandung","Surabaya","Yogyakarta"],c:"Jakarta"},
{q:"Kerajaan Majapahit berada di?",a:["Jawa Timur","Bali","Sumatra","Kalimantan"],c:"Jawa Timur"},
{q:"Penemu benua Amerika?",a:["Columbus","Magellan","Newton","Tesla"],c:"Columbus"},

// MATEMATIKA
{q:"2,4,6,8,... suku ke5?",a:["10","12","14","16"],c:"10"},
{q:"3,6,9,12 beda deret?",a:["3","2","4","5"],c:"3"},
{q:"5,10,15 suku ke6?",a:["30","35","40","45"],c:"30"},
{q:"1,4,7 beda deret?",a:["3","2","4","5"],c:"3"},
{q:"10,20,30 suku ke4?",a:["40","50","60","70"],c:"40"},

// ASTRONOMI
{q:"Planet terbesar?",a:["Jupiter","Mars","Venus","Saturnus"],c:"Jupiter"},
{q:"Bintang pusat tata surya?",a:["Matahari","Sirius","Polaris","Vega"],c:"Matahari"},
{q:"Planet merah?",a:["Mars","Venus","Saturnus","Merkurius"],c:"Mars"},
{q:"Galaksi bumi?",a:["Bima Sakti","Andromeda","Orion","Pegasus"],c:"Bima Sakti"},
{q:"Satelit alami bumi?",a:["Bulan","Europa","Titan","Phobos"],c:"Bulan"},

// BAHASA INDONESIA
{q:"Antonim besar?",a:["Kecil","Panjang","Lebar","Tinggi"],c:"Kecil"},
{q:"Sinonim cepat?",a:["Lekas","Lambat","Diam","Pelan"],c:"Lekas"},
{q:"Kalimat tanya diakhiri?",a:["?","!",".",","],c:"?"},
{q:"Lawan kata panas?",a:["Dingin","Hangat","Sejuk","Beku"],c:"Dingin"},
{q:"Sinonim indah?",a:["Cantik","Buruk","Kasar","Gelap"],c:"Cantik"},
{q:"Huruf kapital digunakan?",a:["Awal kalimat","Tengah kata","Akhir kalimat","Angka"],c:"Awal kalimat"},
{q:"Kata kerja disebut?",a:["Verba","Nomina","Adjektiva","Konjungsi"],c:"Verba"},
{q:"Kalimat perintah diakhiri?",a:["!","?",".",","],c:"!"},
{q:"Lawan kata tinggi?",a:["Rendah","Pendek","Kecil","Tipis"],c:"Rendah"},
{q:"Aku membaca buku termasuk?",a:["Kalimat aktif","Kalimat pasif","Frasa","Majas"],c:"Kalimat aktif"},

// KANJI
{q:"Kanji 山 artinya?",a:["Gunung","Air","Api","Langit"],c:"Gunung"},
{q:"Kanji 水 artinya?",a:["Air","Api","Tanah","Langit"],c:"Air"},
{q:"Kanji 火 artinya?",a:["Api","Air","Angin","Langit"],c:"Api"},
{q:"Kanji 木 artinya?",a:["Pohon","Gunung","Api","Air"],c:"Pohon"},
{q:"Kanji 日 artinya?",a:["Matahari","Bulan","Air","Api"],c:"Matahari"},
{q:"Kanji 月 artinya?",a:["Bulan","Hari","Api","Angin"],c:"Bulan"},
{q:"Kanji 人 artinya?",a:["Orang","Gunung","Api","Air"],c:"Orang"},
{q:"Kanji 口 artinya?",a:["Mulut","Mata","Hidung","Telinga"],c:"Mulut"},
{q:"Kanji 目 artinya?",a:["Mata","Mulut","Tangan","Kaki"],c:"Mata"}

]

/* HIRAGANA */

const hiragana=[
["あ","a"],["い","i"],["う","u"],["え","e"],["お","o"],
["か","ka"],["き","ki"],["く","ku"],["け","ke"],["こ","ko"],
["さ","sa"],["し","shi"],["す","su"],["せ","se"],["そ","so"],
["た","ta"],["ち","chi"],["つ","tsu"],["て","te"],["と","to"],
["な","na"],["に","ni"],["ぬ","nu"],["ね","ne"],["の","no"],
["は","ha"],["ひ","hi"],["ふ","fu"],["へ","he"],["ほ","ho"]
]

/* KATAKANA */

const katakana=[
["ア","a"],["イ","i"],["ウ","u"],["エ","e"],["オ","o"],
["カ","ka"],["キ","ki"],["ク","ku"],["ケ","ke"],["コ","ko"],
["サ","sa"],["シ","shi"],["ス","su"],["セ","se"],["ソ","so"],
["タ","ta"],["チ","chi"],["ツ","tsu"],["テ","te"],["ト","to"],
["ナ","na"],["ニ","ni"],["ヌ","nu"],["ネ","ne"],["ノ","no"],
["ハ","ha"],["ヒ","hi"],["フ","fu"],["ヘ","he"],["ホ","ho"],
["マ","ma"],["ミ","mi"],["ム","mu"],["メ","me"],["モ","mo"],
["ヤ","ya"],["ユ","yu"],["ヨ","yo"],
["ラ","ra"],["リ","ri"],["ル","ru"],["レ","re"],["ロ","ro"],
["ワ","wa"],["ヲ","wo"],["ン","n"]
]

function generateKana(list,label){

let q=[]

list.forEach(item=>{

let char=item[0]
let correct=item[1]

let options=[correct]

while(options.length<4){

let r=list[Math.floor(Math.random()*list.length)][1]

if(!options.includes(r)) options.push(r)

}

options=shuffle(options)

q.push({
q:label+" "+char+" artinya?",
a:options,
c:correct
})

})

return q

}

/* GABUNG SOAL */

let questions=[
...generalQuestions,
...generateKana(hiragana,"Hiragana"),
...generateKana(katakana,"Katakana")
]

questions=shuffle(questions)

/* SOAL TERAKHIR */

questions.push({
q:"Apakah kamu karbit? (Jawab jujur)",
a:["Ya","Tidak"],
c:null,
honest:true
})

/* QUIZ */

let index=0
let score=0

const q=document.getElementById("question")
const a=document.getElementById("answers")

function load(){

let data=questions[index]

q.innerText=(index+1)+". "+data.q

a.innerHTML=""

data.a.forEach(opt=>{

let btn=document.createElement("button")

btn.innerText=opt

btn.onclick=()=>answer(btn,opt,data)

a.appendChild(btn)

})

}

function answer(btn,choice,data){

if(data.honest){

btn.style.background="#f1c40f"

}else{

if(choice===data.c){
btn.classList.add("correct")
score++
}else{

btn.classList.add("wrong")

Array.from(a.children).forEach(b=>{
if(b.innerText===data.c) b.classList.add("correct")
})

}

}

setTimeout(()=>{

index++

if(index<questions.length) load()
else finish()

},700)

}

function finish(){

document.getElementById("quiz").style.display="none"
document.getElementById("result").style.display="block"

document.getElementById("score").innerText=
"Score kamu: "+score+" / "+(questions.length-1)

loadBoard()

}

/* LEADERBOARD */

function saveScore(){

let name=document.getElementById("name").value

if(!name)return

let board=JSON.parse(localStorage.getItem("quizBoard"))||[]

board.push({name,score})

board.sort((a,b)=>b.score-a.score)

board=board.slice(0,10)

localStorage.setItem("quizBoard",JSON.stringify(board))

loadBoard()

}

function loadBoard(){

let board=JSON.parse(localStorage.getItem("quizBoard"))||[]

let list=document.getElementById("leaderboard")

list.innerHTML=""

board.forEach(p=>{

let li=document.createElement("li")

li.innerText=p.name+" - "+p.score

list.appendChild(li)

})

}

load()

</script>

</body>
</html>
